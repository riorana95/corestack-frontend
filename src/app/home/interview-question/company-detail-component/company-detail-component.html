<div class="container">

  <!-- COMPANY LIST -->
  @if (!selectedCompany()) {

    <div class="companies-section">

      <h2 class="section-title">Companies</h2>
      <p class="section-subtitle">
        Select a company to start practicing interview questions
      </p>

      <div class="companies-grid">
        @for (company of companies(); track company) {
          <div class="company-card" (click)="selectCompany(company)">
            <div class="company-name">{{ company }}</div>
            <div class="company-arrow">→</div>
          </div>
        }
      </div>

    </div>
  }

  <!-- QUESTIONS SECTION -->
  @if (selectedCompany()) {

    <div class="questions-section">

      <div class="section-header">
        <button class="back-btn" (click)="clearSelection()">←</button>
        <h2>{{ selectedCompany() }}</h2>
        <button class="add-btn" (click)="addQuestionPopup()">+ Add Question</button>
      </div>

      @for (question of selectedQuestions(); track question.question) {
        <app-question-card-component
          [question]="question"
          [companyName]="selectedCompany()"
          (updatedData)="onQuestionUpdated($event)"
        >
        </app-question-card-component>
      }

    </div>

  }

</div>
