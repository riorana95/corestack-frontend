<div class="container">
  <!-- Company List -->
    @if (!selectedCompany()) {
  <div class="row gy-4">
    <h2>Companies</h2>
    @for (company of companies(); track company) {
      <div class="col-3">
      <div class="card" (click)="selectCompany(company)">
       {{ company }}
      </div>
      </div>

    }
  </div>
}

  <!-- Questions for Selected Company -->
  @if (selectedCompany()) {
    <div class="questions-section">
      <!-- <button class="back-btn" (click)="clearSelection()">Back to Companies</button> -->
      <h2>{{ selectedCompany() }}</h2>
      @for (question of selectedQuestions(); track question.question) {
        <app-question-card-component [question]="question" [companyName]="selectedCompany()"></app-question-card-component>
      }
    </div>
  }
</div>
