<div class="filter-card">
  <div class="filter-group">
    <label>Company</label>
    <select [(ngModel)]="selectedCompany" (change)="onFilterChange()">
      <option>All</option>
      @for(companyName of companyList; track companyName){
        <option [value]="companyName">{{companyName}}</option>
      }
      
    </select>
  </div>

  <div class="filter-group">
    <label>Skill</label>
    <select [(ngModel)]="selectedTag" (change)="onFilterChange()">
      <option>All</option>
       @for(skill of skillList; track skill){
        <option [value]="skill">{{skill}}</option>
      }
    </select>
  </div>

  <div class="filter-group">
    <label>Sort By</label>
    <select [(ngModel)]="sortBy" (change)="onSortChange()">
      <option value="most-asked">Most Asked Questions</option>
      <option value="all">All Questions</option>
    </select>
  </div>

  <div class="filter-action" style="align-content: end;">
    <button (click)="filterQuestions()">Search</button>
  </div>
</div>
