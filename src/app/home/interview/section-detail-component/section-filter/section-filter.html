<div class="filter-card">
  <div class="filter-group">
    <label>Company</label>
    <select [(ngModel)]="selectedCompany">
      <option>All</option>
      @for(companyName of companyList; track companyName){
        <option [value]="companyName">{{companyName}}</option>
      }
      
    </select>
  </div>

  <div class="filter-group">
    <label>Skill</label>
    <select [(ngModel)]="selectedTag">
      <option>All</option>
       @for(skill of skillList; track skill){
        <option [value]="skill">{{skill}}</option>
      }
    </select>
  </div>

  <div class="filter-action">
    <button (click)="filterQuestions()">Search</button>
  </div>
</div>
